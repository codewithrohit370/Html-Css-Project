<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://www.ultraedit.com/wp-content/uploads/2023/01/UE-logo.svg">

        </div>

            <p>Product <span class="arrow"> > </span></p>

            <p>Support <span class="arrow"> > </span></p>
            <p>Learn <span class="arrow"> > </span></p>

        <div class="section-3">
            <button class="download-btn"> Download</button>
            <p><i class="fa-solid fa-globe"></i>English</p>
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>

</html>
