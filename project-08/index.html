<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="time">
            <p class="hour">00:</p>
            <p class="min">00:</p>
            <p class="sec">00</p>
        </div>
        <div class="btns">
            <button onclick="resetTimer()">Reset Time</button>
            <button class="start-btn" onclick="startTime()">Start Timer </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
