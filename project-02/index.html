<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Design</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=verified" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <div class="card">
        <div class="Image-box">
            <img src="1.jpg" class="img1">
            <div class="info">
                <div class="heading">
                    <h2>Sophie Bennett</h2>
                    <span class="material-symbols-outlined" style="font-size: 16px;">
                        verified
                    </span>
                </div>
                <p class="p1">Product Designer Who focuses on simplicity & usability</p>


                <div class="grid">
                    <div class="icon1">
                        <i class="fa-regular fa-user icon3"></i>
                        <p class="p2">312</p>
                    </div>
                    <div class="icon2">
                        <i class="fa-regular fa-image icon4"></i>
                        <p class="p3">48</p>
                    </div>
                    <button class="follow-btn">Follow</button>
                </div>
            </div>


        </div>
</body>

</html>
